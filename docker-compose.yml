version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: carflow_db
    restart: always
    environment:
      POSTGRES_USER: carflow
      POSTGRES_PASSWORD: carflow_secret
      POSTGRES_DB: carflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carflow -d carflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: carflow_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://carflow:carflow_secret@postgres:5432/carflow_db"
      NEXTAUTH_SECRET: "change-me-in-production-use-strong-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
